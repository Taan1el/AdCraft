name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # GitHub Actions often sets NODE_ENV=production globally, which makes `npm ci`
      # skip devDependencies. Next.js + Tailwind v4 need dev-time packages during `next build`.
      NODE_ENV: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install (web)
        working-directory: apps/web
        run: npm ci

      - name: Build static export
        working-directory: apps/web
        env:
          # Project Pages URL is always /<repo>/...
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # Set this in GitHub repo Settings → Secrets and variables → Actions
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
